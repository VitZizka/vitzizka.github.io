        body {
            background-color: #e3e4de; 
            color: #1a1a1a;
            font-family: "Times", "Times New Roman", serif;
            margin: 0;
            padding: 12vh 20px 6vh 20px; 
            text-align: center;
            -webkit-font-smoothing: antialiased;
            overflow-y: scroll; 
        }

        h1 {
            font-size: 2.6rem;
            font-weight: normal;
            letter-spacing: 0.25em;
            margin: 0 0 3.5rem 0; 
        }

        /* The Phantom Photo Box */
        .contact-info {
            width: 100%;
            max-width: 420px;
            /* This height mimics a portrait photo so the footer doesn't jump */
            min-height: 55vh; 
            margin: 0 auto 3.5rem auto; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers the text inside the phantom box */
            align-items: center;
        }

        .contact-info p {
            margin: 0.5rem 0;
            font-size: 1.2rem; 
            letter-spacing: 0.15em;
        }

        .contact-info a {
            color: #1a1a1a;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .contact-info a:hover { opacity: 0.5; }

        .nav-links {
            margin: 0 0 1.5rem 0;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .nav-links a {
            color: #1a1a1a;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: normal;
            letter-spacing: 0.2em;
            transition: opacity 0.3s ease;
        }

        .nav-links a:hover { opacity: 0.5; }

        .social-icons {
            display: flex;
            gap: 1.2rem;
            align-items: center;
            justify-content: center;
        }

        .social-icons a {
            color: #1a1a1a;
            display: inline-block;
            transition: opacity 0.3s ease;
        }

        .social-icons a:hover { opacity: 0.5; }
        .social-icons svg { width: 18px; height: 18px; fill: currentColor; display: block; }
    </style>
